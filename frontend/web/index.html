<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="InterviewMate - AI-powered interview practice">
  <title>InterviewMate</title>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

  <script src="flutter_bootstrap.js" async></script>
</head>
<body>
  <flt-glass-pane id="flutter_target"></flt-glass-pane>

  <script>
    window.addEventListener('flutter.appInitialization', function (e) {
      e.initData.hostElement = document.getElementById('flutter_target');
      e.initData.onPassedFirstFrame = function (callback) {
        callback();
      };
      e.initData.prepare().then(function (app) {
        app.launch();
      });
    });
  </script>
</body>
</html>
